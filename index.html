<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardaşlar Büfe & Cafe | QR Menü</title>
    <style>
        :root {
            --ana-renk: #ff4757; /* Acıkma hissi veren kırmızı */
            --arka-plan: #121212;
            --kart-bg: #1e1e1e;
            --yazi: #ffffff;
            --muted: #a0a0a0;
            --altin: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--arka-plan); color: var(--yazi); line-height: 1.6; }

        /* Header & Logo */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(18,18,18,1) 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--ana-renk);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--ana-renk);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .logo-box img { width: 80%; object-fit: contain; }

        .brand-name { font-size: 24px; font-weight: 800; color: var(--ana-renk); letter-spacing: 1px; }
        .slogan { font-size: 13px; color: var(--muted); margin-bottom: 15px; }

        /* Kampanya Bandı */
        .promo-strip {
            background: var(--ana-renk);
            color: white;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            margin: 10px 0;
            display: block;
        }

        /* Dil Seçimi */
        .lang-select { margin-bottom: 15px; }
        .lang-select button {
            background: #333; border: none; color: white; padding: 5px 15px;
            border-radius: 20px; cursor: pointer; font-size: 12px;
        }
        .lang-select button.active { background: var(--ana-renk); font-weight: bold; }

        /* Arama ve Kategoriler */
        .nav-container { padding: 10px 20px; max-width: 800px; margin: 0 auto; }
        input#searchInput {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: #2a2a2a; color: white; margin-bottom: 15px;
        }

        .cats { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cats::-webkit-scrollbar { display: none; }
        .cats button {
            background: #2a2a2a; border: 1px solid #444; color: white;
            padding: 8px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer;
        }
        .cats button.active { background: var(--altin); color: black; border-color: var(--altin); font-weight: bold; }

        /* Menü Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--kart-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            position: relative;
        }

        .card-img { width: 100%; height: 120px; background-size: cover; background-position: center; }
        
        .card-body { padding: 12px; }
        .card-body h3 { font-size: 16px; margin-bottom: 5px; }
        .card-body p { font-size: 12px; color: var(--muted); height: 36px; overflow: hidden; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .old-price { text-decoration: line-through; color: #ff4757; font-size: 11px; display: block; }
        .price { color: #2ecc71; font-weight: bold; font-size: 16px; }

        .badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--ana-renk); color: white;
            padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold;
        }

        /* Admin/Yönetim Paneli Butonu (Gizli gibi) */
        .admin-trigger {
            text-align: center; padding: 40px; color: #333; font-size: 10px; cursor: pointer;
        }

        /* WhatsApp */
        .wa-float {
            position: fixed; bottom: 20px; right: 20px;
            background: #25d366; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
        }

        @media (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
            .card-img { height: 100px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <!-- Buraya logonuzu koyun. Yoksa bu ikon kalır -->
        <img src="https://cdn-icons-png.flaticon.com/512/1996/1996055.png" alt="Logo">
    </div>
    <div class="brand-name" id="b-name">GARDAŞLAR BÜFE</div>
    <div class="slogan" id="b-slogan">Fatsa'nın En Kral Lezzet Durağı</div>

    <div class="lang-select">
        <button onclick="setLang('tr')" id="tr-btn" class="active">TR</button>
        <button onclick="setLang('en')" id="en-btn">EN</button>
    </div>

    <div class="nav-container">
        <div class="promo-strip" id="promo-text">🔥 KAMPANYA: 2 Karışık Tost Alana Ayran Bedava!</div>
        <input type="text" id="searchInput" placeholder="Yemek ara..." oninput="renderItems()">
        <div class="cats" id="cat-list"></div>
    </div>
</header>

<div class="menu-grid" id="menu-area">
    <!-- Ürünler JS ile dolacak -->
</div>

<a href="https://wa.me/905554443322" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" alt="WP">
</a>

<div class="admin-trigger" onclick="adminModu()">Yönetici Girişi (Gizli)</div>

<script>
    let lang = 'tr';
    let cat = 'all';

    // ÜRÜN LİSTESİ (ABİN BURAYI DEĞİŞTİREBİLİR)
    const items = [
        { id:1, cat:'tost', tr:'Karışık Tost', en:'Mixed Toast', desc_tr:'Sucuk, kaşar, salam ve turşu.', desc_en:'Sausage, cheese and pickles.', price:'120₺', old:'150₺', img:'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400', badge:'Çok Satan' },
        { id:2, cat:'tost', tr:'Ayvalık Tostu', en:'Ayvalik Toast', desc_tr:'Özel ekmeğinde bol malzeme.', desc_en:'Authentic Ayvalik style toast.', price:'140₺', img:'https://images.unsplash.com/photo-1539252554454-31d626304629?w=400', badge:'' },
        { id:3, cat:'atistirma', tr:'Patates Tabağı', en:'French Fries', desc_tr:'Büyük boy çıtır patates.', desc_en:'Large crispy fries.', price:'80₺', img:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400', badge:'' },
        { id:4, cat:'atistirma', tr:'Çıtır Tavuk (6lı)', en:'Crispy Chicken', desc_tr:'Özel soslu tavuk parçaları.', desc_en:'Special fried chicken bites.', price:'150₺', old:'180₺', img:'https://images.unsplash.com/photo-1562967914-608f82629710?w=400', badge:'Fırsat' },
        { id:5, cat:'sandvic', tr:'Kumru', en:'Kumru Sandwich', desc_tr:'İzmir usulü bol sucuk ve peynir.', desc_en:'Sausage and melted cheese.', price:'160₺', img:'https://images.unsplash.com/photo-1550507992-04d74509439b?w=400', badge:'' },
        { id:6, cat:'sandvic', tr:'Patso', en:'Patso', desc_tr:'Ekmek arası patates ve sosis.', desc_en:'Fries and sausage in bread.', price:'110₺', img:'https://images.unsplash.com/photo-1585109649139-366815a0d713?w=400', badge:'' },
        { id:7, cat:'icecek', tr:'Açık Ayran', en:'Fresh Ayran', desc_tr:'Bol köpüklü ev yapımı.', desc_en:'Traditional salty yogurt drink.', price:'35₺', img:'https://images.unsplash.com/photo-1571153103767-19eb71e44c21?w=400', badge:'' },
        { id:8, cat:'icecek', tr:'Kola', en:'Cola', desc_tr:'330ml Kutu.', desc_en:'330ml Can.', price:'50₺', img:'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400', badge:'' }
    ];

    const cats = {
        tr: { all:'Hepsi', tost:'Tostlar', atistirma:'Atıştırmalık', sandvic:'Sandviç/Patso', icecek:'İçecekler' },
        en: { all:'All', tost:'Toasts', atistirma:'Snacks', sandvic:'Sandwiches', icecek:'Drinks' }
    };

    function renderCats() {
        const div = document.getElementById('cat-list');
        div.innerHTML = '';
        Object.keys(cats[lang]).forEach(k => {
            const btn = document.createElement('button');
            btn.innerText = cats[lang][k];
            btn.className = (cat === k) ? 'active' : '';
            btn.onclick = () => { cat = k; renderCats(); renderItems(); };
            div.appendChild(btn);
        });
    }

    function renderItems() {
        const area = document.getElementById('menu-area');
        const search = document.getElementById('searchInput').value.toLowerCase();
        area.innerHTML = '';

        const filtered = items.filter(i => {
            const matchCat = (cat === 'all' || i.cat === cat);
            const matchSearch = i[lang].toLowerCase().includes(search);
            return matchCat && matchSearch;
        });

        filtered.forEach(i => {
            area.innerHTML += `
                <div class="menu-card">
                    ${i.badge ? `<div class="badge">${i.badge}</div>` : ''}
                    <div class="card-img" style="background-image:url('${i.img}')"></div>
                    <div class="card-body">
                        <h3>${i[lang]}</h3>
                        <p>${i['desc_'+lang]}</p>
                        <div class="price-row">
                            <div>
                                ${i.old ? `<span class="old-price">${i.old}</span>` : ''}
                                <span class="price">${i.price}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function setLang(l) {
        lang = l;
        document.getElementById('tr-btn').classList.toggle('active', l==='tr');
        document.getElementById('en-btn').classList.toggle('active', l==='en');
        document.getElementById('searchInput').placeholder = (l==='tr' ? 'Yemek ara...' : 'Search food...');
        renderCats();
        renderItems();
    }

    // Basit bir admin simülasyonu
    function adminModu() {
        const sifre = prompt("Yönetici Şifresi Girin:");
        if(sifre === "1234") {
            const yeniKampanya = prompt("Yeni Kampanya Yazısı:", document.getElementById('promo-text').innerText);
            if(yeniKampanya) document.getElementById('promo-text').innerText = yeniKampanya;
            
            alert("Ürün fiyatlarını değiştirmek için kodun içindeki 'items' listesini güncelleyin.");
        } else {
            alert("Hatalı şifre!");
        }
    }

    // Sayfa Yüklenince
    renderCats();
    renderItems();
</script>

</body>
</html>
