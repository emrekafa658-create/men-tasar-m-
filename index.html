<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Cafe | Dijital Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #151515;
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: var(--text); font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Giriş Animasyonları */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, var(--dark));
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            animation: slideIn 0.8s ease-out;
        }

        .logo-circle {
            width: 100px; height: 100px;
            background: var(--card);
            border: 2px solid var(--gold);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }
        .logo-circle img { width: 70%; height: auto; filter: brightness(1.2); }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 32px; letter-spacing: 2px; }
        .promo { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; }

        /* Arama ve Kategori */
        .sticky-nav { position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); z-index: 100; padding: 15px 0; border-bottom: 1px solid #222; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        #searchInput {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: var(--accent); color: white; margin-bottom: 15px; outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--gold); }

        .categories { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .categories::-webkit-scrollbar { display: none; }
        .categories button {
            padding: 10px 22px; border-radius: 30px; border: 1px solid #333;
            background: var(--card); color: white; white-space: nowrap; cursor: pointer;
            transition: 0.4s; font-size: 14px;
        }
        .categories button.active { background: var(--gold); color: black; border-color: var(--gold); font-weight: 600; }

        /* Menü Grid */
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 25px 20px; max-width: 1200px; margin: 0 auto;
        }

        .item-card {
            background: var(--card); border-radius: 18px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideIn 0.6s both;
        }
        .item-card:hover { transform: scale(1.03); border-color: var(--gold); }

        .img-box { width: 100%; height: 200px; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .item-card:hover .img-box img { transform: scale(1.1); }

        .card-info { padding: 20px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title-row h3 { font-size: 18px; font-weight: 600; }
        .price { color: var(--gold); font-weight: 800; font-size: 18px; }
        .desc { color: var(--muted); font-size: 13px; line-height: 1.5; }

        /* Admin Modal */
        #adminModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .admin-box { background: #1a1a1a; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        .admin-box input, .admin-box select, .admin-box textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #333; background: #000; color: white;
        }
        .admin-btn { background: var(--gold); color: black; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Footer */
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid #222; margin-top: 40px; }
        .credits { font-size: 12px; color: var(--muted); cursor: pointer; letter-spacing: 1px; }
        .credits span { color: var(--gold); font-weight: bold; }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-circle">
        <!-- Hazır kahve ikonu, istersen buraya kendi logo linkini koyabilirsin -->
        <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" id="mainLogo" alt="Logo">
    </div>
    <h1 id="brandTitle">Demo Cafe</h1>
    <p class="promo">Premium Hub & Social Lounge</p>
</header>

<div class="sticky-nav">
    <div class="container">
        <input type="text" id="searchInput" placeholder="Yemek, içecek veya nargile ara..." oninput="renderItems()">
        <div class="categories" id="catBar"></div>
    </div>
</div>

<div class="menu-grid" id="menuGrid"></div>

<footer onclick="checkAdmin()">
    <p class="credits">© 2026 <span>Demo Cafe</span> | All Rights Reserved.</p>
    <p class="credits" style="margin-top:10px;">Created by <span>@emcozm</span></p>
</footer>

<!-- ADMIN PANEL -->
<div id="adminModal">
    <div class="admin-box">
        <h2 style="color:var(--gold); margin-bottom:20px;">Yönetim Paneli</h2>
        <input type="text" id="editBrand" placeholder="Kafenin Adı">
        <input type="text" id="editLogo" placeholder="Logo Görsel Linki (URL)">
        
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h3 style="margin-bottom:15px;">Yeni Ürün Ekle</h3>
        <input type="text" id="newTitle" placeholder="Ürün Adı">
        <input type="text" id="newPrice" placeholder="Fiyat (örn: 150₺)">
        <select id="newCat">
            <option value="sicak">Sıcak İçecekler</option>
            <option value="soguk">Soğuk İçecekler</option>
            <option value="yemek">Yemekler</option>
            <option value="atistirma">Atıştırmalıklar</option>
            <option value="nargile">Nargileler</option>
        </select>
        <input type="text" id="newImg" placeholder="Ürün Görsel URL">
        <textarea id="newDesc" placeholder="Ürün açıklaması..."></textarea>
        
        <button class="admin-btn" onclick="saveAdmin()">VERİLERİ GÜNCELLE</button>
        <button class="admin-btn" style="background:#333; color:white; margin-top:10px;" onclick="document.getElementById('adminModal').style.display='none'">KAPAT</button>
        
        <div id="deleteList" style="margin-top:20px; max-height:200px; overflow:auto;"></div>
    </div>
</div>

<script>
    const defaultData = {
        brand: "Demo Cafe",
        logo: "https://cdn-icons-png.flaticon.com/512/924/924514.png",
        items: [
            { id: 1, cat: 'yemek', title: 'Özel Demo Burger', price: '280₺', desc: '180gr dana köfte, karamelize soğan, cheddar ve özel sos.', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
            { id: 2, cat: 'yemek', title: 'Fatsa Usulü Karışık Tost', price: '140₺', desc: 'Bol malzeme, kasap sucuk ve gerçek kaşar peyniri.', img: 'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=500' },
            { id: 3, cat: 'nargile', title: 'Premium Love 66', price: '350₺', desc: 'Özel buzlu marpuç ve taze meyve aromalarıyla.', img: 'https://images.unsplash.com/photo-1512413316925-fd4b93f31521?w=500' },
            { id: 4, cat: 'sicak', title: 'White Mocha', price: '115₺', desc: 'Belçika beyaz çikolatası ve taze çekilmiş Arabica çekirdekleri.', img: 'https://images.unsplash.com/photo-1572288641191-7d52917b01b4?w=500' },
            { id: 5, cat: 'atistirma', title: 'Çıtır Sepeti', price: '190₺', desc: 'Soğan halkası, sosis, çıtır tavuk ve parmak patates.', img: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=500' },
            { id: 6, cat: 'soguk', title: 'Çilekli Frozen', price: '125₺', desc: 'Taze dağ çilekleri ve buzun muhteşem uyumu.', img: 'https://images.unsplash.com/photo-1536935338788-846bb9981813?w=500' },
            { id: 7, cat: 'yemek', title: 'Patso Efsanesi', price: '110₺', desc: 'Ekmek arası bol patates ve sosis dilimleri.', img: 'https://images.unsplash.com/photo-1585109649139-366815a0d713?w=500' },
            { id: 8, cat: 'nargile', title: 'Yaban Mersini & Nane', price: '350₺', desc: 'Ferahlatıcı nane ve yoğun yaban mersini tadı.', img: 'https://images.unsplash.com/photo-1512413316925-fd4b93f31521?w=500' }
        ]
    };

    let cafeData = JSON.parse(localStorage.getItem('cafeData_v2')) || defaultData;
    let activeCat = 'all';
    let clicks = 0;

    function init() {
        document.getElementById('brandTitle').innerText = cafeData.brand;
        document.getElementById('mainLogo').src = cafeData.logo;
        renderCats();
        renderItems();
    }

    function renderCats() {
        const cats = { all: 'Hepsi', yemek: 'Yemekler', sicak: 'Sıcaklar', soguk: 'Soğuklar', atistirma: 'Atıştırmalık', nargile: 'Nargile' };
        const bar = document.getElementById('catBar');
        bar.innerHTML = '';
        Object.keys(cats).forEach(k => {
            const btn = document.createElement('button');
            btn.innerText = cats[k];
            btn.className = activeCat === k ? 'active' : '';
            btn.onclick = () => { activeCat = k; renderCats(); renderItems(); };
            bar.appendChild(btn);
        });
    }

    function renderItems() {
        const grid = document.getElementById('menuGrid');
        const search = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        const filtered = cafeData.items.filter(i => {
            return (activeCat === 'all' || i.cat === activeCat) && 
                   (i.title.toLowerCase().includes(search));
        });

        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.style.animationDelay = (index * 0.05) + 's';
            card.innerHTML = `
                <div class="img-box"><img src="${item.img}" alt="${item.title}"></div>
                <div class="card-info">
                    <div class="title-row">
                        <h3>${item.title}</h3>
                        <span class="price">${item.price}</span>
                    </div>
                    <p class="desc">${item.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function checkAdmin() {
        clicks++;
        if(clicks >= 3) {
            const p = prompt("Yönetici Şifresi:");
            if(p === "1234") {
                document.getElementById('adminModal').style.display = 'block';
                document.getElementById('editBrand').value = cafeData.brand;
                document.getElementById('editLogo').value = cafeData.logo;
                renderDeleteList();
            }
            clicks = 0;
        }
    }

    function renderDeleteList() {
        const list = document.getElementById('deleteList');
        list.innerHTML = '<h4 style="margin:10px 0;">Ürün Sil</h4>';
        cafeData.items.forEach((item, index) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#222; padding:5px;">
                <span>${item.title}</span>
                <button onclick="deleteItem(${index})" style="color:red; background:none; border:none; cursor:pointer;">SİL</button>
            </div>`;
        });
    }

    function deleteItem(index) {
        if(confirm("Silinsin mi?")) {
            cafeData.items.splice(index, 1);
            renderDeleteList();
        }
    }

    function saveAdmin() {
        cafeData.brand = document.getElementById('editBrand').value;
        cafeData.logo = document.getElementById('editLogo').value;
        
        const nt = document.getElementById('newTitle').value;
        const np = document.getElementById('newPrice').value;
        
        if(nt && np) {
            cafeData.items.unshift({
                id: Date.now(),
                title: nt,
                price: np,
                cat: document.getElementById('newCat').value,
                img: document.getElementById('newImg').value || 'https://via.placeholder.com/500',
                desc: document.getElementById('newDesc').value
            });
            document.getElementById('newTitle').value = '';
            document.getElementById('newPrice').value = '';
        }

        localStorage.setItem('cafeData_v2', JSON.stringify(cafeData));
        init();
        document.getElementById('adminModal').style.display = 'none';
        alert("Güncellendi!");
    }

    init();
</script>

</body>
</html>
