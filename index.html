<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Cafe | Profesyonel QR Menü</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--dark); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

        /* Header & Logo */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        #mainLogo {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--primary);
            margin-bottom: 10px;
        }
        h1 { font-size: 22px; color: var(--primary); }
        .promo-banner {
            background: linear-gradient(90deg, var(--danger), var(--primary));
            margin: 15px auto; padding: 10px; border-radius: 12px;
            font-size: 14px; font-weight: bold; max-width: 500px;
        }

        /* Nav & Search */
        .controls { padding: 0 20px; max-width: 800px; margin: 0 auto; }
        #searchInput {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155;
            background: var(--card); color: white; margin: 15px 0; outline: none;
        }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .categories button {
            padding: 8px 20px; border-radius: 20px; border: 1px solid #334155;
            background: var(--card); color: white; cursor: pointer; white-space: nowrap;
        }
        .categories button.active { background: var(--primary); color: var(--dark); font-weight: bold; }

        /* Menu Grid */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }
        .item-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .item-img { width: 100%; height: 180px; object-fit: cover; }
        .item-content { padding: 15px; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .item-title { font-size: 18px; font-weight: bold; }
        .item-price { color: var(--success); font-weight: 800; font-size: 18px; }
        .item-desc { color: var(--muted); font-size: 13px; line-height: 1.4; }

        /* Admin Panel Modal */
        #adminModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 999; padding: 20px; overflow-y: auto;
        }
        .admin-content { background: #1e293b; max-width: 600px; margin: 0 auto; padding: 25px; border-radius: 20px; }
        .admin-content h2 { margin-bottom: 20px; color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--muted); }
        input, select, textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569;
            background: #0f172a; color: white;
        }
        .btn-box { display: flex; gap: 10px; margin-top: 20px; }
        button.save { background: var(--success); color: white; flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button.close { background: var(--danger); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; }

        /* Footer */
        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 12px; border-top: 1px solid #334155; margin-top: 30px; }
        .copyright { cursor: pointer; user-select: none; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <img id="mainLogo" src="https://via.placeholder.com/150?text=DEMO" alt="Logo">
    <h1 id="headerName">Demo Cafe</h1>
    <div class="promo-banner" id="headerPromo">🔥 KAMPANYA: 2 Patso Alana Ayran Bedava!</div>
</header>

<div class="controls">
    <input type="text" id="searchInput" placeholder="Yemek veya içecek ara..." oninput="renderItems()">
    <div class="categories" id="catBar">
        <!-- Kategoriler dinamik gelecek -->
    </div>
</div>

<div class="grid" id="menuGrid"></div>

<footer onclick="countClick()">
    <p class="copyright">© 2026 <span id="footerBrand">Demo Cafe</span> | Tüm Hakları Saklıdır.</p>
    <p style="margin-top: 5px;">MMC OZM tarafından profesyonelce hazırlanmıştır.</p>
</footer>

<!-- ADMIN PANEL MODAL -->
<div id="adminModal">
    <div class="admin-content">
        <h2>Yönetim Paneli</h2>
        
        <div class="form-group">
            <label>Kafe İsmi</label>
            <input type="text" id="editBrand" placeholder="Kafe Adı">
        </div>
        <div class="form-group">
            <label>Kampanya Yazısı</label>
            <input type="text" id="editPromo" placeholder="Kampanya mesajı">
        </div>
        <div class="form-group">
            <label>Logo URL</label>
            <input type="text" id="editLogo" placeholder="https://...">
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #334155;">
        <h3>Yeni Ürün Ekle</h3>
        <div class="form-group">
            <input type="text" id="newItemTitle" placeholder="Ürün Adı">
        </div>
        <div class="form-group">
            <input type="text" id="newItemPrice" placeholder="Fiyat (örn: 120₺)">
        </div>
        <div class="form-group">
            <select id="newItemCat">
                <option value="yemek">Yemek</option>
                <option value="atistirma">Atıştırmalık</option>
                <option value="icecek">İçecek</option>
                <option value="tatli">Tatlı</option>
            </select>
        </div>
        <div class="form-group">
            <input type="text" id="newItemImg" placeholder="Görsel URL">
        </div>
        <div class="form-group">
            <textarea id="newItemDesc" placeholder="Ürün açıklaması..."></textarea>
        </div>
        
        <div class="btn-box">
            <button class="save" onclick="saveAdminData()">DEĞİŞİKLİKLERİ KAYDET</button>
            <button class="close" onclick="document.getElementById('adminModal').style.display='none'">KAPAT</button>
        </div>

        <div id="adminItemList" style="margin-top:20px; max-height: 200px; overflow: auto;">
            <!-- Mevcut ürünleri silme listesi buraya gelecek -->
        </div>
    </div>
</div>

<script>
    // VARSAYILAN VERİLER
    const defaultData = {
        brand: "Demo Cafe",
        promo: "🔥 KAMPANYA: 2 Patso Alana Ayran Bedava!",
        logo: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=150",
        items: [
            { id: 1, cat: 'atistirma', title: 'Karışık Tost', price: '120₺', desc: 'Kasap sucuk, tam yağlı kaşar ve turşu.', img: 'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400' },
            { id: 2, cat: 'yemek', title: 'Özel Patso', en:'Mixed Toast', price: '100₺', desc: 'Çıtır patates, sosis ve özel soslu ekmek.', img: 'https://images.unsplash.com/photo-1585109649139-366815a0d713?w=400' },
            { id: 3, cat: 'atistirma', title: 'Çıtır Tavuk Kovası', price: '180₺', desc: '8 adet kemiksiz çıtır tavuk ve parmak patates.', img: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=400' },
            { id: 4, cat: 'icecek', title: 'Büyük Ayran', price: '40₺', desc: 'Bol köpüklü, yayık tadında.', img: 'https://images.unsplash.com/photo-1571153103767-19eb71e44c21?w=400' }
        ]
    };

    let appData = JSON.parse(localStorage.getItem('cafeData')) || defaultData;
    let activeCat = 'all';
    let clickCount = 0;

    // BAŞLANGIÇ
    function init() {
        document.getElementById('headerName').innerText = appData.brand;
        document.getElementById('footerBrand').innerText = appData.brand;
        document.getElementById('headerPromo').innerText = appData.promo;
        document.getElementById('mainLogo').src = appData.logo;
        renderCats();
        renderItems();
    }

    function renderCats() {
        const cats = { all: 'Hepsi', yemek: 'Yemekler', atistirma: 'Atıştırmalık', icecek: 'İçecekler', tatli: 'Tatlılar' };
        const bar = document.getElementById('catBar');
        bar.innerHTML = '';
        Object.keys(cats).forEach(k => {
            const btn = document.createElement('button');
            btn.innerText = cats[k];
            btn.className = activeCat === k ? 'active' : '';
            btn.onclick = () => { activeCat = k; renderCats(); renderItems(); };
            bar.appendChild(btn);
        });
    }

    function renderItems() {
        const grid = document.getElementById('menuGrid');
        const query = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        const filtered = appData.items.filter(i => {
            return (activeCat === 'all' || i.cat === activeCat) && 
                   (i.title.toLowerCase().includes(query));
        });

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="item-card">
                    <img src="${item.img}" class="item-img" alt="${item.title}">
                    <div class="item-content">
                        <div class="item-header">
                            <span class="item-title">${item.title}</span>
                            <span class="item-price">${item.price}</span>
                        </div>
                        <p class="item-desc">${item.desc}</p>
                    </div>
                </div>
            `;
        });
    }

    // ADMIN FONKSİYONLARI
    function countClick() {
        clickCount++;
        if(clickCount >= 3) {
            const pw = prompt("Yönetici Şifresi:");
            if(pw === "1234") {
                openAdmin();
            }
            clickCount = 0;
        }
    }

    function openAdmin() {
        document.getElementById('adminModal').style.display = 'block';
        document.getElementById('editBrand').value = appData.brand;
        document.getElementById('editPromo').value = appData.promo;
        document.getElementById('editLogo').value = appData.logo;
        
        const list = document.getElementById('adminItemList');
        list.innerHTML = '<h4>Ürün Sil</h4>';
        appData.items.forEach((item, index) => {
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; background:#0f172a; padding:5px; margin:5px 0;">
                    <span>${item.title}</span>
                    <button onclick="deleteItem(${index})" style="background:red; color:white; border:none; padding:2px 5px; cursor:pointer;">Sil</button>
                </div>
            `;
        });
    }

    function deleteItem(index) {
        if(confirm("Bu ürünü silmek istediğinize emin misiniz?")) {
            appData.items.splice(index, 1);
            openAdmin();
        }
    }

    function saveAdminData() {
        appData.brand = document.getElementById('editBrand').value;
        appData.promo = document.getElementById('editPromo').value;
        appData.logo = document.getElementById('editLogo').value;

        // Yeni ürün varsa ekle
        const newT = document.getElementById('newItemTitle').value;
        const newP = document.getElementById('newItemPrice').value;
        if(newT && newP) {
            appData.items.push({
                id: Date.now(),
                title: newT,
                price: newP,
                cat: document.getElementById('newItemCat').value,
                img: document.getElementById('newItemImg').value || 'https://via.placeholder.com/400',
                desc: document.getElementById('newItemDesc').value
            });
            // Formu temizle
            document.getElementById('newItemTitle').value = '';
            document.getElementById('newItemPrice').value = '';
        }

        localStorage.setItem('cafeData', JSON.stringify(appData));
        init();
        document.getElementById('adminModal').style.display = 'none';
        alert("Sistem başarıyla güncellendi!");
    }

    init();
</script>

</body>
</html>
