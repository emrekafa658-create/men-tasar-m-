<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luna Café & Brasserie | QR Menu</title>
  <style>
    :root {
      --bg: #05070a;
      --card: #111827;
      --accent: #f59e0b; /* Altın/Turuncu */
      --accent-rgb: 245, 158, 11;
      --success: #22c55e;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(17, 24, 39, 0.7);
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(34, 197, 94, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header & Navigation */
    header {
      padding: 24px 18px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    .brand h1 {
      font-size: 22px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .lang-switch {
      background: rgba(255,255,255,0.05);
      padding: 4px;
      border-radius: 12px;
      display: flex;
    }

    .lang-switch button {
      border: none; background: transparent; color: var(--muted);
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 12px; transition: 0.3s;
    }

    .lang-switch button.active {
      background: var(--accent);
      color: #000;
    }

    .search-container {
      max-width: 1000px;
      margin: 16px auto 0;
    }

    .search-container input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: #white;
      outline: none;
      transition: 0.3s;
    }

    .search-container input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.06);
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 15px 0;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }

    .categories button {
      white-space: nowrap;
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .categories button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }

    /* Grid & Cards */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .card-img {
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* İndirim Rozeti */
    .promo-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: #ef4444;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      z-index: 2;
    }

    .card-content { padding: 18px; }

    .card-info h3 { font-size: 17px; margin-bottom: 6px; color: var(--text); }

    .card-info .desc {
      font-size: 13px;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .price-container { display: flex; flex-direction: column; }

    .old-price {
      font-size: 12px;
      text-decoration: line-through;
      color: #ef4444;
      margin-bottom: -2px;
    }

    .price {
      font-size: 18px;
      font-weight: 800;
      color: var(--success);
    }

    .item-tag {
      font-size: 11px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      color: var(--muted);
    }

    /* Floating WhatsApp */
    .whatsapp-btn {
      position: fixed;
      bottom: 25px; right: 25px;
      background: #25D366;
      width: 60px; height: 60px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
      z-index: 1000;
      transition: 0.3s;
    }

    .whatsapp-btn:hover { transform: scale(1.1) rotate(10deg); }

    footer {
      padding: 40px 20px 100px;
      text-align: center;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .brand h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand">
      <h1 id="titleText">Luna Café & Brasserie</h1>
    </div>
    <div class="lang-switch">
      <button id="btnTR" class="active">TR</button>
      <button id="btnEN">EN</button>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Tadına bakmak istediğiniz bir şey..." />
    <div class="categories" id="categoryButtons"></div>
  </div>
</header>

<div class="container">
  <div class="section-title" id="sectionTitle">Günün Seçimleri</div>
  <div class="grid" id="menuGrid"></div>
</div>

<a class="whatsapp-btn" href="https://wa.me/905555555555" target="_blank">

</a>

<footer>
  <p id="footerText">© 2026 Luna Café | Handcrafted Flavors</p>
</footer>

<script>
  let currentLang = "tr";
  let currentCategory = "all";

  const translations = {
    tr: {
      all: "Tümü", breakfast: "Kahvaltı", salty: "Ana Yemek", sweet: "Tatlı", drinks: "İçecekler",
      menuTitle: "Günün Seçimleri", searchPlaceholder: "Lezzet ara...",
      popular: "Popüler", new: "Yeni Ürün", promo: "İNDİRİM"
    },
    en: {
      all: "All", breakfast: "Breakfast", salty: "Main Course", sweet: "Desserts", drinks: "Drinks",
      menuTitle: "Chef's Selection", searchPlaceholder: "Search for flavors...",
      popular: "Popular", new: "New", promo: "OFFER"
    }
  };

  const menuItems = [
    // --- KAHVALTI ---
    {
      category: "breakfast",
      tr: { name: "Luna Serpme Kahvaltı", desc: "32 çeşit ürün, sınırsız çay ve ev yapımı reçellerle." },
      en: { name: "Luna Premium Breakfast", desc: "32 varieties of local flavors, unlimited tea." },
      price: "450₺", oldPrice: "550₺", tag: "popular",

    },
    {

      en: { name: "Avocado Poached Eggs", desc: "Poached eggs on sourdough with smashed avocado." },
      price: "240₺", tag: "new",
      img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?auto=format&fit=crop&w=600"
    },

    // --- ANA YEMEKLER (SALTY) ---
    {
      category: "salty",

      en: { name: "Truffle Mushroom Burger", desc: "180g beef patty, truffle mayo, wild mushrooms." },
      price: "290₺", tag: "popular",
      img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=600"
    },
    {
      category: "salty",
      tr: { name: "Antrikot Izgara", desc: "Karamelize soğanlı patates püresi ve kuşkonmaz ile." },
      en: { name: "Grilled Ribeye", desc: "Served with caramelized onion mashed potatoes." },
      price: "580₺", oldPrice: "650₺", tag: "popular",
      img: "https://images.unsplash.com/photo-1546241072-48010ad28c2c?auto=format&fit=crop&w=600"
    },
    {
      category: "salty",
      tr: { name: "Fettuccine Alfredo", desc: "Tavuk dilimleri, mantar ve kremsi alfredo sos." },
      en: { name: "Fettuccine Alfredo", desc: "Chicken slices, mushrooms and creamy alfredo sauce." },
      price: "260₺", tag: "new",
      img: "https://images.unsplash.com/photo-1645112481338-35624bfbc17b?auto=format&fit=crop&w=600"
    },
    {
      category: "salty",
      tr: { name: "Falafel Bowl", desc: "Humus, kinoa, avokado ve tahin soslu sağlıklı kase." },
      en: { name: "Falafel Bowl", desc: "Healthy bowl with hummus, quinoa, and tahini sauce." },
      price: "220₺", tag: "new",
      img: "https://images.unsplash.com/photo-1540420753464-3304b63ff4f4?auto=format&fit=crop&w=600"
    },

    // --- TATLILAR ---
    {
      category: "sweet",
      tr: { name: "San Sebastian Cheesecake", desc: "Belçika çikolatası sosu eşliğinde servis edilir." },
      en: { name: "San Sebastian", desc: "Served with premium Belgian chocolate sauce." },

    },

    // --- İÇECEKLER ---
    {

      tr: { name: "Iced Salted Caramel", desc: "Soğuk süt, karamel ve deniz tuzu dokunuşu." },
      en: { name: "Iced Salted Caramel", desc: "Cold milk, caramel and a touch of sea salt." },
      price: "135₺", tag: "new",
      img: "https://images.unsplash.com/photo-1572288641191-7d52917b01b4?auto=format&fit=crop&w=600"
    },
    {
      category: "drinks",
      tr: { name: "Detox Green Juice", desc: "Salatalık, elma, nane ve taze zencefil." },
      en: { name: "Detox Green Juice", desc: "Cucumber, apple, mint and fresh ginger." },
      price: "110₺", tag: "popular",
      img: "https://images.unsplash.com/photo-1615478503562-ec2e8aa0e24e?auto=format&fit=crop&w=600"
    },
    {
      category: "drinks",
      tr: { name: "Hibiscus Ice Tea", desc: "Ev yapımı hibiskus ve böğürtlenli soğuk çay." },
      en: { name: "Hibiscus Ice Tea", desc: "Homemade hibiscus and blackberry cold tea." },
      price: "95₺", tag: "new",
      img: "https://images.unsplash.com/photo-1499638673689-79a0b5115d87?auto=format&fit=crop&w=600"
    }
  ];

  function renderCategories() {
    const catDiv = document.getElementById("categoryButtons");
    catDiv.innerHTML = "";
    const cats = ["all", "breakfast", "salty", "sweet", "drinks"];

    cats.forEach(key => {
      const btn = document.createElement("button");
      btn.innerText = translations[currentLang][key];
      btn.classList.toggle("active", currentCategory === key);
      btn.onclick = () => { currentCategory = key; renderCategories(); renderMenu(); };
      catDiv.appendChild(btn);
    });
  }

  function renderMenu() {
    const grid = document.getElementById("menuGrid");
    const search = document.getElementById("searchInput").value.toLowerCase();
    grid.innerHTML = "";

    const filtered = menuItems.filter(item => {
      const matchCat = currentCategory === "all" || item.category === currentCategory;
      const matchSearch = item[currentLang].name.toLowerCase().includes(search) || 
                          item[currentLang].desc.toLowerCase().includes(search);
      return matchCat && matchSearch;
    });

    filtered.forEach(item => {
      const lang = item[currentLang];
      const hasPromo = item.oldPrice ? true : false;
      
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-img" style="background-image:url('${item.img}')">
          ${hasPromo ? `<div class="promo-badge">${translations[currentLang].promo}</div>` : ""}
        </div>
        <div class="card-content">
          <div class="card-info">
            <h3>${lang.name}</h3>
            <p class="desc">${lang.desc}</p>
          </div>
          <div class="card-footer">
            <div class="price-container">
              ${hasPromo ? `<span class="old-price">${item.oldPrice}</span>` : ""}
              <span class="price">${item.price}</span>
            </div>
            <span class="item-tag">${translations[currentLang][item.tag] || ""}</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.getElementById("btnTR").classList.toggle("active", lang === 'tr');
    document.getElementById("btnEN").classList.toggle("active", lang === 'en');
    document.getElementById("sectionTitle").innerText = translations[lang].menuTitle;
    document.getElementById("searchInput").placeholder = translations[lang].searchPlaceholder;
    renderCategories();
    renderMenu();
  }

  document.getElementById("btnTR").onclick = () => setLanguage("tr");
  document.getElementById("btnEN").onclick = () => setLanguage("en");
  document.getElementById("searchInput").oninput = renderMenu;

  // Başlat
  setLanguage("tr");
</script>

</body>
</html>
